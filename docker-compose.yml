services:
  postgres:
    image: postgres:16-alpine
    container_name: threadly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: threadly
      POSTGRES_PASSWORD: threadly
      POSTGRES_DB: threadly
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threadly -d threadly"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: threadly-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: threadly-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: dev_master_key_change_me
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili-data:/meili_data

volumes:
  postgres-data:
  redis-data:
  meili-data:
